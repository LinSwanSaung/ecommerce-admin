name: CI

# Quality gate: lint, unit tests, and a production build on every push and PR.
# Deployment is handled by Vercel's Git integration, not this workflow.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a new push doesn't queue behind stale ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
